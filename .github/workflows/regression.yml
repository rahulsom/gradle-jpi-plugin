# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Regression

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-jpi2:
    name: jpi2/${{ matrix.os }}/${{ matrix.gradle_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        gradle_version: ["8.14.3", "9.2.1"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"
        cache: "gradle"
    - name: Test ${{ matrix.gradle_version }}
      run: ./gradlew :jpi2:testGradle${{ matrix.gradle_version }}
    - name: Archive Test Results on Failure
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: ${{ matrix.os }}-${{ matrix.gradle_version }}-test-results
        path: build/reports/tests
